<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Kirby</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="nav justify-content-center mb-5 ">
            <img src="Assets/Kirby-Logo-New.svg.png" alt="Logo Kirby" id="KirbyLogo1">
        </nav>
    </header>

    <main class="justify-content-center d-flex mb-5  mt-5">
        <div class="justify-content-center mx--50">
            <div class="p-3  rounded-4 shadow  mx--5 c-Login">
                <form class="container-xxl" id="form-login">

                    <h2 class="text-center mb-3" id="LoginText">Login</h2>
                    <div class="form-floating">
                        <input type="text" placeholder="Ex:admin" id="userName" title="admin"
                            class="form-control shadow p-3 mb-3 bg-body-tertiary rounded" required>
                        <label for="userName">Nome:</label>
                    </div>
                    <div class="form-floating">
                        <input type="password" placeholder="1234" id="userPass" title="1234"
                            class="form-control shadow p-3 mb-3 bg-body-tertiary rounded" required>
                        <label for="userPass">Senha:</label>
                    </div>
                    <div>
                        <button class="btn btn-dark vstack gap-2 mb-2 mx-auto d-flex" type="submit"
                            id="ButtonLogin">Entrar</button>
                    </div>
                    <div id="mensagem"></div>
                    <div id="toggle">
                        <p>Esqueceu sua senha? Cadastre-se</p>
                    </div>
                </form>
            </div>
            <script src="scripts.js"></script>
        </div>
    </main>
    <footer class="d-flex justify-content-center gap-2">
        <img src="Assets/Kirby_esperando.gif" alt="kirby" class="Kirby_espera">
        <p class="fs-4">Todos os direitos reservados a Roberto Stockhausen Hille e Daniel Tonioti</p><img
            src="Assets/Kirby_esperando.gif" alt="Kirby esperando" class="Kirby_espera">
    </footer>
</body>

</html>
