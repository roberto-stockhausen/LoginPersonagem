<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header >
        <nav class="nav justify-content-center">
            <img src="Assets/Kirby-Logo-New.svg.png" alt="Logo Kirby" id="KirbyLogo">
        </nav>
    </header>
    <main>
        <div>
            <form id="form-login">

                <h2>Login</h2>
                <div>

                    <label for="userName">Nome:</label>
                    <input type="text" placeholder="Ex:Joaozinho" id="userName" class="" required>
                </div>
                <div>

                    <label for="userPass">Senha: </label>
                    <input type="password" placeholder="Ex:123123tt" id="userPass" required>
                </div>
                <div>
                    <button type="submit">botao</button>
                </div>
                <div id="toggle">
                    <p>Esqueceu sua senha? Cadastre-se</p>
                </div>
            </form>
        </div>
        <script src="scripts.js"></script>
    </main>
</body>
</html>
