<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header >
        <nav class="nav justify-content-center">
            <img src="Assets/Kirby-Logo-New.svg.png" alt="Logo Kirby" id="KirbyLogo">
        </nav>
    </header>
    <div>

        <main class="justify-middle top-50 position-absolute-y">
            <div class="position-absolute top-50 start-50 translate-middle">

                <div class=" p-3  rounded-4 shadow  mx--5 c-Login">
                    <form id="form-login">
        
                        <h2 class="text-center mb-3"id="Login">Login</h2>
                        <div class="input-group flex-nowrap">
                            <label for="userName" class="input-group-text" id="addon-wrapping">Nome:</label>
                            <input type="text" placeholder="Ex:Joaozinho" id="userName" class="form-control" required>
                        </div>
                        <div class="input-group flex-nowrap">
                            <label for="userPass" class="input-group-text" id="addon-wrapping">Senha: </label>
                            <input type="password" placeholder="Ex:123123tt" id="userPass" class="form-control" required>
                        </div>
                        <div>
                            <button class="btn btn-dark vstack gap-2 col-md-5 mx-auto" type="submit">botao</button>
                        </div>
                        <div id="mensagem"></div>
                        <div id="toggle">
                            <p>Esqueceu sua senha? Cadastre-se</p>
                        </div>
                    </form>
                </div>
                <script src="scripts.js"></script>
            </div>
        </main>
    </div>
</body>
</html>
