<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Home Page Kirby</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <header>
    <nav class="nav justify-content-center darkpink DistBottom">
      <img src="Assets/Kirby-Logo-New.svg.png" alt="Logo Kirby" id="KirbyLogo2">
    </nav>
  </header>
<main class="justify-content-center d-flex mb-5">
  <div class="gap-3 mt-5">
    <div class="container-xxl justify-content-center">
      <div class="card-group gap-2">
        
        <div class="card corFundo" id="togglePresentation" style="cursor: pointer;">
          <img src="Assets/Kirby_Acenando.png" class="card-img p-3 mt-4 opacity-75" alt="Apresentação">
          <div class="card-img-overlay">
            <h5 class="card-title">Apresentação</h5>
          </div>
        </div>

        <div class="card corFundo" id="toggleHistory" style="cursor: pointer;">
          <img src="Assets/Kirby_historia.png" class="card-img p-3 mt-4 opacity-75" alt="História">
          <div class="card-img-overlay">
            <h5 class="card-title">História</h5>
          </div>
        </div>

        <div class="card corFundo" id="toggleCuriosity" style="cursor: pointer;">
          <img src="Assets/kirby_duvidando.png" class="card-img p-3 mt-2 opacity-75" alt="Curiosidades">
          <div class="card-img-overlay">
            <h5 class="card-title">Curiosidades</h5>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script src="Scripts/ScriptForum.js"></script>
</main>
  <footer class="d-flex justify-content-center gap-2 posFooter">
    <img src="Assets/Kirby_esperando.gif" alt="kirby" class="Kirby_espera">
    <p class="fs-4">Todos os direitos reservados a Roberto Stockhausen Hille e Daniel Tonioti</p><img
      src="Assets/Kirby_esperando.gif" alt="Kirby esperando" class="Kirby_espera">
  </footer>
</body>

</html>
